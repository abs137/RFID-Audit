<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Container Tag Entry</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  :root {
    --bg: #f4f7fb;
    --card: #ffffff;
    --primary: #2563eb;
    --secondary: #64748b;
    --border: #e2e8f0;
    --active: #e0f2fe;
    --text: #1e293b;
    --muted: #64748b;
    --radius: 12px;
  }

  body {
    font-family: system-ui, -apple-system, Segoe UI;
    background: var(--bg);
    margin: 0;
    padding: 12px;
    color: var(--text);
  }

  .card {
    max-width: 900px;
    margin: auto;
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: 0 8px 24px rgba(15,23,42,0.08);
  }

  h2 {
    text-align: center;
    margin: 6px 0 14px;
    font-weight: 600;
  }

  .top-actions {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--card);
    padding: 10px 0;
    margin-bottom: 12px;
    display: flex;
    gap: 12px;
    justify-content: center;
    border-bottom: 1px solid var(--border);
  }

  button {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    cursor: pointer;
    background: var(--primary);
    color: #fff;
    font-weight: 500;
  }

  button.secondary {
    background: var(--secondary);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 6px;
  }

  th {
    background: #f1f5f9;
    font-weight: 600;
    font-size: 14px;
    padding: 10px;
    border-bottom: 2px solid var(--border);
    text-align: left;
  }

  td {
    border-bottom: 1px solid var(--border);
    padding: 8px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    border-radius: 8px;
    border: 1px solid var(--border);
    box-sizing: border-box;
    background: #fff;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }

  tr.active-row {
    background: var(--active);
  }

  tr.active-row td {
    border-bottom-color: #bae6fd;
  }

  #scannerWrap {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    padding: 16px;
  }

  #qr-reader {
    max-width: 360px;
    margin: auto;
  }

  .scanner-actions {
    text-align: center;
    margin-top: 14px;
  }

  .scanner-actions button {
    width: 180px;
  }

  @media (max-width: 600px) {
    th { font-size: 13px; }
    button { width: 100%; }
    .top-actions { flex-direction: column; gap: 8px; }
  }
</style>
</head>

<body>

<div class="card">
  <h2>Container Tag Entry</h2>

  <div class="top-actions">
    <button onclick="startScan()">📷 Scan Container</button>
    <button class="secondary" onclick="downloadExcel()">⬇ Download Excel</button>
  </div>

  <table>
    <thead>
      <tr>
        <th style="width:45%">Container ID</th>
        <th style="width:35%">Type</th>
        <th style="width:20%">Count</th>
      </tr>
    </thead>
    <tbody id="dataBody"></tbody>
  </table>
</div>

<div id="scannerWrap">
  <div id="qr-reader"></div>
  <div class="scanner-actions">
    <button class="secondary" onclick="stopScan()">Stop Camera</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const TYPE_OPTIONS = [
  "Tag Missing",
  "Double Tag",
  "Tag Damage",
  "Invalid Tag",
  "Tag Wrong"
];

let tableBody;
let activeRow = null;
let html5QrCode = null;
let scannerActive = false;

document.addEventListener("DOMContentLoaded", () => {
  tableBody = document.getElementById("dataBody");
  addRow();
});

function addRow() {
  const tr = document.createElement("tr");

  const tdId = document.createElement("td");
  const idInput = document.createElement("input");
  idInput.placeholder = "Enter or Scan";
  tdId.appendChild(idInput);

  const tdType = document.createElement("td");
  const typeSelect = document.createElement("select");
  typeSelect.innerHTML =
    `<option value="">Select</option>` +
    TYPE_OPTIONS.map(v => `<option value="${v}">${v}</option>`).join("");
  tdType.appendChild(typeSelect);

  const tdCount = document.createElement("td");
  const countInput = document.createElement("input");
  countInput.type = "number";
  countInput.min = "0";
  tdCount.appendChild(countInput);

  tr.append(tdId, tdType, tdCount);
  tableBody.appendChild(tr);

  tr.addEventListener("click", () => setActiveRow(tr));

  [idInput, typeSelect, countInput].forEach(el => {
    el.addEventListener("focus", () => setActiveRow(tr));
  });

  typeSelect.addEventListener("change", () => {
    if (typeSelect.value) countInput.focus();
  });

  countInput.addEventListener("change", () => {
    if (idInput.value && typeSelect.value && countInput.value) {
      if (tr === tableBody.lastElementChild) {
        addRow();
        tableBody.lastElementChild.querySelector("input").focus();
      }
    }
  });
}

function setActiveRow(row) {
  document.querySelectorAll("#dataBody tr")
    .forEach(r => r.classList.remove("active-row"));
  row.classList.add("active-row");
  activeRow = row;
}

async function startScan() {
  if (scannerActive) return alert("Scanner already open");
  if (!activeRow) return alert("Please select a row first");

  scannerActive = true;
  document.body.style.overflow = "hidden";
  document.getElementById("scannerWrap").style.display = "block";

  html5QrCode = new Html5Qrcode("qr-reader");

  try {
    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 15, qrbox: { width: 220, height: 220 } },
      decodedText => {
        activeRow.querySelector("input").value = decodedText.trim();
        stopScan();
        activeRow.querySelector("select").focus();
      }
    );
  } catch {
    alert("Camera could not start");
    stopScan();
  }
}

async function stopScan() {
  if (html5QrCode) {
    try {
      await html5QrCode.stop();
      await html5QrCode.clear();
    } catch {}
  }
  html5QrCode = null;
  scannerActive = false;
  document.body.style.overflow = "";
  document.getElementById("scannerWrap").style.display = "none";
}

function downloadExcel() {
  const rows = [];
  const timestamp = new Date().toLocaleString();

  document.querySelectorAll("#dataBody tr").forEach(tr => {
    const inputs = tr.querySelectorAll("input, select");
    if (inputs[0].value && inputs[1].value && inputs[2].value) {
      rows.push({
        "Container ID": inputs[0].value,
        "Type": inputs[1].value,
        "Count": inputs[2].value,
        "Entry Date": timestamp
      });
    }
  });

  if (!rows.length) return alert("No data to download");

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Data");

  const fileName = `Container_Tag_Data_${new Date()
    .toISOString()
    .slice(0,10)}.xlsx`;

  XLSX.writeFile(wb, fileName);
}
</script>

</body>
</html>
